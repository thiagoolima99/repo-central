name: Reusable - Node.js Security

on:
  workflow_call:
    inputs:
      fail-on-high:
        description: "Block pipeline on HIGH/CRITICAL findings"
        type: boolean
        default: true

jobs:
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

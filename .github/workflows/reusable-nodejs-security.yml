name: Reusable - Node.js Security

on:
  workflow_call:
    inputs:
      fail-on-high:
        description: "Block pipeline on HIGH/CRITICAL findings"
        type: boolean
        default: true

jobs:
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca-snyk:
    name: SCA - Dependency Check (Snyk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Snyk SCA
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high
        continue-on-error: ${{ !inputs.fail-on-high }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sast-snyk:
    name: SAST - Code Analysis (Snyk Code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk Code (JSON output)
        run: |
          npm install -g snyk
          snyk auth ${{ secrets.SNYK_TOKEN }}
          snyk code test --json > snyk-code-results.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Check for HIGH/CRITICAL findings
        run: |
          HIGH=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('snyk-code-results.json'))
              runs = data.get('runs', [])
              count = 0
              for run in runs:
                  for result in run.get('results', []):
                      level = result.get('level', '')
                      if level in ['error', 'warning']:
                          props = result.get('properties', {})
                          severity = props.get('priorityScore', 0)
                          rule_id = result.get('ruleId', '')
                          # Check severity via rule metadata
                          rules = {r['id']: r for r in run.get('tool', {}).get('driver', {}).get('rules', [])}
                          rule = rules.get(rule_id, {})
                          sev = rule.get('properties', {}).get('tags', [])
                          if 'high' in [s.lower() for s in sev] or level == 'error':
                              count += 1
              print(count)
          except Exception as e:
              print(0)
          ")
          echo "HIGH/CRITICAL findings: $HIGH"
          if [ "$HIGH" -gt "0" ] && [ "${{ inputs.fail-on-high }}" == "true" ]; then
            echo "❌ Snyk Code found $HIGH HIGH/CRITICAL issues. Pipeline blocked."
            exit 1
          fi

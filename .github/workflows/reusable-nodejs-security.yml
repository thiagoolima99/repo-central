name: Reusable - Node.js Security

on:
  workflow_call:
    inputs:
      fail-on-high:
        description: "Block pipeline on HIGH/CRITICAL findings"
        type: boolean
        default: true

jobs:
  secrets-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sca-snyk:
    name: SCA - Dependency Check (Snyk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Snyk SCA
        uses: snyk/actions/node@master
        with:
          args: --severity-threshold=high
        continue-on-error: ${{ !inputs.fail-on-high }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sast-snyk:
    name: SAST - Code Analysis (Snyk Code)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Snyk Code
        uses: snyk/actions/node@master
        with:
          command: code test
          args: --severity-threshold=high
        continue-on-error: ${{ !inputs.fail-on-high }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
